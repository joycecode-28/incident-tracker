name: Python CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install flask requests pytest

      - name: Run tests
        run: |
          pytest
      
      - name: Lint code
        run: |
          pip install flake8
          flake8 .
